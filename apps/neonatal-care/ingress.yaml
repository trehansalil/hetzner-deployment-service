# Ingress with TLS via cert-manager (Let's Encrypt)
# Uses Traefik — k3s's built-in ingress controller (already owns ports 80/443)
# Prerequisites:
#   1. cert-manager installed + ClusterIssuer 'letsencrypt-prod' created
#   2. DNS A record: neonate-logger.saliltrehan.com → Hetzner server IP
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neonatal-care-ingress
  namespace: neonatal-care
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - neonate-logger.saliltrehan.com
    secretName: neonatal-care-tls
  rules:
  - host: neonate-logger.saliltrehan.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: neonatal-care-nginx
            port:
              number: 80
