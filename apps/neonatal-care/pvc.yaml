# Persistent Volume Claims for stateful services.
# Uses the default StorageClass — on Hetzner with k3s this is 'local-path'.
# For production, use Hetzner CSI driver (hcloud-volumes) for network-attached storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: neonatal-care
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: hcloud-volumes  # uncomment for Hetzner CSI
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-logs
  namespace: neonatal-care
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: neonatal-care
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: neonatal-care
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
