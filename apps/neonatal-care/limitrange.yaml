apiVersion: v1
kind: LimitRange
metadata:
  name: neonatal-care-defaults
  namespace: neonatal-care
spec:
  limits:
  - type: Container
    default:
      memory: "512Mi"
      cpu: "500m"
    defaultRequest:
      memory: "128Mi"
      cpu: "100m"
    max:
      memory: "2Gi"
      cpu: "2000m"
    min:
      memory: "32Mi"
      cpu: "10m"
  - type: Pod
    max:
      memory: "4Gi"   # single pod hard ceiling
      cpu: "4000m"
