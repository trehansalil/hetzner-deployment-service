apiVersion: apps/v1
kind: Deployment
metadata:
  name: pageindex-mcp-worker
  namespace: pageindex-mcp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pageindex-mcp-worker
  template:
    metadata:
      labels:
        app: pageindex-mcp-worker
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: worker
          image: ghcr.io/trehansalil/pageindex-mcp:latest
          imagePullPolicy: Always
          command: ["arq", "pageindex_mcp.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: pageindex-mcp-config
            - secretRef:
                name: pageindex-mcp-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
