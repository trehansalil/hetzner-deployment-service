apiVersion: v1
kind: ConfigMap
metadata:
  name: pageindex-mcp-config
  namespace: pageindex-mcp
data:
  MINIO_ENDPOINT: "neonatal-care-minio.neonatal-care:9000"
  MINIO_BUCKET: "pageindex"
  MINIO_SECURE: "false"
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8201"
  REDIS_URL: "redis://neonatal-care-redis.neonatal-care:6379/1"
  WEB_CONCURRENCY: "1"
  CACHE_TTL: "300"
  PAGEINDEX_MODEL: "gpt-4o-2024-11-20"
  PAGEINDEX_FILTER_MODEL: "gpt-4o-mini"
  PAGEINDEX_SEARCH_MODEL: "gpt-4o-mini"
  PAGEINDEX_SEARCH_CONCURRENCY: "3"
