  hr_chatbot_full.json: |
    {
      "description": "Flydubai HR Chatbot — full observability: metrics, latency, errors and live logs for every service",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
