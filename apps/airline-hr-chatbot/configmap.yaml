          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "hr_chat_active_sessions", "legendFormat": "Active Sessions", "refId": "A" }],
          "title": "Active Sessions",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }]},
              "unit": "none"
            }
          },
