# ┌─────────────────────────────────────────────────────────────────────────┐
# │  COPY THIS FILE to neonatal-care-repo/.github/workflows/build-push.yml │
# │  It does NOT run from hetzner-deployment-service.                       │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Builds the Docker image, pushes to GHCR, then triggers the deploy workflow
# in hetzner-deployment-service via repository_dispatch.

name: Build & Push Image

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/trehansalil/neonatal-care
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger deploy in hetzner-deployment-service
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}   # PAT with repo scope on hetzner-deployment-service
          repository: trehansalil/hetzner-deployment-service
          event-type: neonatal-care-image-updated
          client-payload: |
            {
              "app": "neonatal-care",
              "image_tag": "sha-${{ github.sha }}"
            }
