# Deploy workflow — lives in hetzner-deployment-service
# Triggered by:
#   1. A repository_dispatch event from neonatal-care-repo or airline-hr-chatbot after image push
#   2. Manual workflow_dispatch for any app

name: Deploy to Hetzner

on:
  repository_dispatch:
    types:
      - neonatal-care-image-updated
      - airline-hr-chatbot-image-updated
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy'
        required: true
        default: 'neonatal-care'
        type: choice
        options:
          - neonatal-care
          - airline-hr-chatbot
      image_tag:
        description: 'Image tag (SHA or latest)'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Determine app and image tag
        id: vars
        run: |
          APP=${{ github.event.client_payload.app || github.event.inputs.app || 'neonatal-care' }}
          TAG=${{ github.event.client_payload.image_tag || github.event.inputs.image_tag || 'latest' }}
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Apply k8s manifests — neonatal-care
        if: steps.vars.outputs.app == 'neonatal-care'
        run: |
          kubectl apply -f apps/neonatal-care/namespace.yaml
          kubectl apply -f apps/neonatal-care/limitrange.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/resourcequota.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/configmap.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/pvc.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/deployment.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/service.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/ingress.yaml -n neonatal-care
          kubectl apply -f apps/neonatal-care/cronjob-pod-cleanup.yaml -n neonatal-care

      - name: Apply k8s manifests — airline-hr-chatbot
        if: steps.vars.outputs.app == 'airline-hr-chatbot'
        run: |
          kubectl apply -f apps/airline-hr-chatbot/namespace.yaml
          kubectl apply -f apps/airline-hr-chatbot/rbac.yaml
          kubectl apply -f apps/airline-hr-chatbot/configmap.yaml -n hr-chatbot
          kubectl apply -f apps/airline-hr-chatbot/pvc.yaml -n hr-chatbot
          kubectl apply -f apps/airline-hr-chatbot/deployment.yaml -n hr-chatbot
          kubectl apply -f apps/airline-hr-chatbot/daemonset.yaml -n hr-chatbot
          kubectl apply -f apps/airline-hr-chatbot/service.yaml -n hr-chatbot
          kubectl apply -f apps/airline-hr-chatbot/ingress.yaml -n hr-chatbot

      - name: Update image tag (rolling deploy) — neonatal-care
        if: steps.vars.outputs.app == 'neonatal-care'
        run: |
          kubectl set image deployment/neonatal-care-backend \
            neonatal-care-backend=ghcr.io/trehansalil/neonatal-care:${{ steps.vars.outputs.image_tag }} \
            -n neonatal-care
          kubectl set image deployment/neonatal-care-nginx \
            copy-static=ghcr.io/trehansalil/neonatal-care:${{ steps.vars.outputs.image_tag }} \
            -n neonatal-care
          kubectl rollout restart deployment/neonatal-care-nginx -n neonatal-care
          kubectl rollout status deployment/neonatal-care-backend -n neonatal-care --timeout=300s
          kubectl rollout status deployment/neonatal-care-nginx -n neonatal-care --timeout=120s

      - name: Update image tag (rolling deploy) — airline-hr-chatbot
        if: steps.vars.outputs.app == 'airline-hr-chatbot'
        run: |
          kubectl set image deployment/app \
            app=ghcr.io/trehansalil/airline-hr-chatbot:${{ steps.vars.outputs.image_tag }} \
            -n hr-chatbot
          kubectl set image deployment/oracle \
            oracle=ghcr.io/trehansalil/airline-hr-chatbot:${{ steps.vars.outputs.image_tag }} \
            -n hr-chatbot
          kubectl rollout status deployment/app -n hr-chatbot --timeout=300s
          kubectl rollout status deployment/oracle -n hr-chatbot --timeout=120s

      - name: Post-deploy pod cleanup — neonatal-care
        if: steps.vars.outputs.app == 'neonatal-care'
        run: |
          echo "Cleaning up evicted/failed/succeeded pods post-deploy..."
          kubectl delete pods -n neonatal-care --field-selector=status.phase==Failed --ignore-not-found || true
          kubectl delete pods -n neonatal-care --field-selector=status.phase==Succeeded --ignore-not-found || true

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ steps.vars.outputs.app == 'airline-hr-chatbot' && 'hr-chatbot' || steps.vars.outputs.app }}
